image efi-part.vfat {
	vfat {
		file EFI {
			image = "efi-part/EFI"
		}
		file Image {
			image = "Image"
		}
	}

	size = 64M
}

image disk.img {
	hdimage {
		partition-table-type = "gpt"
	}

	partition boot {
		image = "efi-part.vfat"
		partition-type-uuid = U
		offset = 32K
		bootable = true
	}

	partition root {
		partition-type-uuid = root-arm64
		image = "rootfs.ext2"
	}
}
